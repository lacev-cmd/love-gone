<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Gone — Access unlocked</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1A0A0A; --accent: #C4965A; --ink: #F0EBE3; --mid: #A89880;
    --muted: #8A7060; --faint: #6A5040; --border: #3D3530; --white: #2F2925;
    --font: 'Inter', sans-serif;
  }
  body { background: var(--bg); font-family: var(--font); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
  a { text-decoration: none; color: inherit; }

  nav { padding: 1.25rem 2.5rem; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 1rem; }
  .logo-text p:first-child { font-size: 17px; font-weight: 500; letter-spacing: 0.16em; color: var(--accent); }
  .logo-text p:last-child { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 12px; padding: 2.5rem 2.25rem;
    max-width: 420px; width: 100%; text-align: center;
  }
  .check-mark {
    width: 52px; height: 52px; border-radius: 50%;
    background: #1e3a1e; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 1.5rem;
  }
  .check-mark svg { width: 26px; height: 26px; }
  .card-kicker { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin: 0 0 0.6rem; }
  .card h1 { font-size: 22px; font-weight: 500; color: var(--ink); margin: 0 0 0.75rem; line-height: 1.3; }
  .card p { font-size: 14px; color: var(--mid); line-height: 1.7; margin: 0 0 1.75rem; }
  .btn-primary {
    display: inline-block; background: var(--accent); color: #1A0A0A;
    border-radius: 8px; padding: 0.8rem 2rem; font-size: 14px;
    font-weight: 500; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .redirect-note { font-size: 12px; color: var(--muted); margin-top: 1rem; margin-bottom: 0; }
  .error-note { font-size: 13px; color: #c0504a; margin-top: 1rem; display: none; }

  footer { border-top: 1px solid var(--border); padding: 1.5rem 2.5rem; }
  footer p { font-size: 12px; color: var(--faint); }

  @media (max-width: 600px) {
    nav { padding: 1rem 1.25rem; }
    .main { padding: 2rem 1.25rem; align-items: flex-start; padding-top: 3rem; }
    footer { padding: 1.5rem 1.25rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <svg width="44" height="37" viewBox="0 0 160 140">
      <polyline points="0,0 80,150 160,0" fill="none" stroke="#C4965A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
      <polyline points="22,0 80,103 138,0" fill="none" stroke="#C4965A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      <polyline points="50,0 80,56 110,0" fill="none" stroke="#C4965A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="1"/>
    </svg>
    <div class="logo-text">
      <p>LOVE GONE</p>
      <p>Pattern Reading Machine</p>
    </div>
  </a>
</nav>

<div class="main">
  <div class="card">
    <div class="check-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4a9a4a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="card-kicker">Payment confirmed</p>
    <h1>Export and reports unlocked.</h1>
    <p>Your purchase is verified. You can now export your grief map and download your full report on this device.</p>
    <a class="btn-primary" href="index.html">Return to Love Gone</a>
    <p class="redirect-note" id="redirect-note">Verifying your payment…</p>
    <p class="error-note" id="error-note"></p>
  </div>
</div>

<footer>
  <p>© 2026 Lace V</p>
</footer>

<script>
  const BACKEND   = 'https://lacev-backend-production.up.railway.app';
  const STORE_KEY = 'lovegone_access_token';
  const REDIRECT  = 'index.html';

  async function claimToken() {
    const params     = new URLSearchParams(window.location.search);
    const sessionId  = params.get('session_id');
    const note       = document.getElementById('redirect-note');
    const errorNote  = document.getElementById('error-note');

    if (!sessionId) {
      note.style.display = 'none';
      errorNote.style.display = 'block';
      errorNote.textContent = 'No session ID found. If you completed payment, please contact support.';
      return;
    }

    try {
      const res = await fetch(`${BACKEND}/token/claim`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      if (!data.token) throw new Error('No token in response');

      localStorage.setItem(STORE_KEY, data.token);
      window.history.replaceState({}, '', window.location.pathname);

      let countdown = 4;
      note.textContent = `Taking you back in ${countdown}…`;
      const timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          window.location.href = REDIRECT;
        } else {
          note.textContent = `Taking you back in ${countdown}…`;
        }
      }, 1000);

    } catch (err) {
      note.style.display = 'none';
      errorNote.style.display = 'block';
      errorNote.textContent = 'We could not verify your payment right now. Please try refreshing, or contact support if the problem continues.';
      console.error('Token claim error:', err);
    }
  }

  claimToken();
</script>

</body>
</html>
